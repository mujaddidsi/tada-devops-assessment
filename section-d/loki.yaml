# =============================================================
# Loki - Log Aggregation System
# Purpose: Collect and store logs from all payment pods
#          for searching and debugging
#
# What is Loki?
# Like Elasticsearch but optimized for logs
# Works natively with Grafana — search logs alongside metrics
#
# Why Loki and not Elasticsearch for logs?
# Elasticsearch indexes every word in every log line
# → very powerful search but very expensive storage
#
# Loki only indexes labels (service, namespace, pod)
# → cheaper storage, fast enough for log search
# → logs stored compressed in S3
#
# How logs flow:
# Pod → Promtail (log collector) → Loki → Grafana
# =============================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: monitoring
spec:
  replicas: 3      # 3 replicas for HA
  selector:
    matchLabels:
      app: loki
  serviceName: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:2.9.0
          ports:
            - containerPort: 3100
              name: http
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: storage
              mountPath: /data/loki

      volumes:
        - name: config
          configMap:
            name: loki-config

  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    ingester:
      # How long to keep logs in memory before flushing
      chunk_idle_period: 5m
      chunk_retain_period: 30s
      # Maximum chunk size before flushing to storage
      max_chunk_age: 1h

    schema_config:
      configs:
        - from: 2024-01-01
          store: boltdb-shipper
          object_store: s3
          schema: v11
          index:
            prefix: payment_logs_
            period: 24h   # New index every 24 hours

    storage_config:
      # Store logs in S3 — cheap and scalable
      aws:
        s3: s3://tada-payment-logs/loki
        region: ap-southeast-1
      boltdb_shipper:
        active_index_directory: /data/loki/index
        cache_location: /data/loki/cache
        shared_store: s3

    limits_config:
      # Maximum log ingestion rate per tenant
      ingestion_rate_mb: 100
      ingestion_burst_size_mb: 200
      # Keep logs for 30 days
      retention_period: 720h   # 30 days

    compactor:
      working_directory: /data/loki/compactor
      shared_store: s3
      # Run compaction every 10 minutes
      compaction_interval: 10m
      # Delete logs older than retention period
      retention_enabled: true
      retention_delete_delay: 2h

---
# Promtail: runs on every node, collects pod logs
# Sends logs to Loki
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      containers:
        - name: promtail
          image: grafana/promtail:2.9.0
          args:
            - -config.file=/etc/promtail/promtail.yaml
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            # Mount host log directory to collect pod logs
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          # Parse JSON logs from payment service
          - json:
              expressions:
                level: level
                payment_id: payment_id
                merchant_id: merchant_id
                duration_ms: duration_ms
                status: status
          # Add parsed fields as labels for fast searching
          - labels:
              level:
              payment_id:
              merchant_id:
              status:
        relabel_configs:
          # Only collect logs from payments namespace
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: payments
          # Add pod name as label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Add service name as label
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service