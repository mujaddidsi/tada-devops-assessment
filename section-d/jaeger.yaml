# =============================================================
# Jaeger - Distributed Tracing Backend
# Purpose: Store and visualize distributed traces
#          to track a single transaction across all services
#
# What is distributed tracing?
# When user makes a payment, request touches many services:
# API → Kinesis → Consumer → DynamoDB → Aurora → Redis
#
# Without tracing:
# Something is slow — but WHERE? Which service? Which line?
# Impossible to know without tracing.
#
# With Jaeger:
# See the FULL journey of one transaction:
# API: 5ms → Kinesis: 2ms → Consumer: 8ms → DynamoDB: 3ms
# Total: 18ms — bottleneck clearly visible
#
# Deployment:
# Jaeger All-in-One for simplicity
# In production: separate collector, query, storage components
# =============================================================

apiVersion: jaegertracing.io/v1
kind: Jaeger
metadata:
  name: jaeger
  namespace: monitoring
spec:
  strategy: production

  # ── Collector ───────────────────────────────────────────
  # Receives traces from OTel Collector
  collector:
    replicas: 3      # 3 replicas for HA
    resources:
      requests:
        cpu: "1"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "2Gi"
    options:
      collector:
        # Max queue size for incoming spans
        # At 1M TPS with 1% sampling = 10,000 spans/sec
        queue-size: 100000
        # Number of workers processing spans
        num-workers: 100

  # ── Storage ─────────────────────────────────────────────
  # Where traces are stored
  # Using Elasticsearch for scalable trace storage
  storage:
    type: elasticsearch
    options:
      es:
        server-urls: http://elasticsearch:9200
        # Keep traces for 7 days
        # Longer retention = more storage cost
        index-prefix: payment-traces
    esIndexCleaner:
      enabled: true
      numberOfDays: 7
      schedule: "55 23 * * *"   # Clean up at 11:55 PM daily

  # ── Query UI ────────────────────────────────────────────
  # Web interface for searching and viewing traces
  query:
    replicas: 2
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
    options:
      query:
        # Base path for Jaeger UI
        base-path: /jaeger

  # ── Agent ───────────────────────────────────────────────
  # Runs as sidecar next to each pod
  # Receives spans from app and forwards to collector
  agent:
    strategy: DaemonSet   # One agent per node

  # ── Sampling Strategy ───────────────────────────────────
  sampling:
    options:
      default_strategy:
        type: probabilistic
        param: 0.01        # 1% sampling by default

      # Per-service sampling override
      service_strategies:
        # Payment service: higher sampling for critical path
        - service: payment-service
          type: probabilistic
          param: 0.05      # 5% sampling for payment service

        # Error traces: always sample
        - service: payment-service
          type: ratelimiting
          param: 100       # Always sample errors