# =============================================================
# Secrets Store CSI Driver + AWS Secrets Manager
# Purpose: Securely inject secrets into pods without
#          storing them in Kubernetes Secrets or env vars
#
# Why not use Kubernetes Secrets directly?
# Kubernetes Secrets are base64 encoded — NOT encrypted
# Anyone with kubectl access can decode them easily
# Secrets stored in etcd — if etcd is compromised, all secrets exposed
#
# Why Secrets Store CSI Driver?
# Secrets fetched directly from AWS Secrets Manager
# Mounted as files inside pod — never stored in etcd
# Auto-rotation: when secret rotates in AWS, pod gets new value
# IRSA: no hardcoded AWS credentials needed
#
# Flow:
# Pod starts → CSI driver fetches secret from Secrets Manager
# → mounts as file inside pod → app reads from file
# Secret never touches etcd or Kubernetes Secrets
# =============================================================

# ── SecretProviderClass ───────────────────────────────────────
# Defines which secrets to fetch and how to mount them
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: payment-secrets
  namespace: payments
spec:
  # Use AWS provider
  provider: aws
  parameters:
    objects: |
      # Database credentials from Secrets Manager
      - objectName: "prod/payment/db-credentials"
        objectType: secretsmanager
        # Extract specific fields from JSON secret
        jmesPath:
          - path: username
            objectAlias: db_username
          - path: password
            objectAlias: db_password

      # API keys for payment gateway
      - objectName: "prod/payment/api-keys"
        objectType: secretsmanager
        jmesPath:
          - path: stripe_key
            objectAlias: stripe_api_key
          - path: midtrans_key
            objectAlias: midtrans_api_key

      # Kinesis stream ARN from Parameter Store
      - objectName: "/payment/kinesis-stream-arn"
        objectType: ssmparameter

      # JWT signing key
      - objectName: "prod/payment/jwt-secret"
        objectType: secretsmanager

  # Sync secrets to Kubernetes Secret object
  # Allows using secrets as environment variables if needed
  secretObjects:
    - secretName: payment-db-credentials
      type: Opaque
      data:
        - objectName: db_username
          key: username
        - objectName: db_password
          key: password

    - secretName: payment-api-keys
      type: Opaque
      data:
        - objectName: stripe_api_key
          key: stripe_key
        - objectName: midtrans_api_key
          key: midtrans_key

---
# ── Deployment using CSI Driver ───────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: payments
spec:
  template:
    spec:
      # Service account with IRSA role
      # IRSA = IAM Role for Service Account
      # Gives pod permission to access Secrets Manager
      # No hardcoded AWS credentials needed!
      serviceAccountName: payment-service-sa

      containers:
        - name: payment-service
          image: payment-service:latest

          # Mount secrets as files — most secure approach
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets"
              readOnly: true

          # Application reads secrets from files:
          # /mnt/secrets/db_username
          # /mnt/secrets/db_password
          # /mnt/secrets/stripe_api_key
          # Never from environment variables or hardcoded!

      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: payment-secrets

---
# ── Service Account with IRSA ─────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-service-sa
  namespace: payments
  annotations:
    # Link to IAM role that can access Secrets Manager
    eks.amazonaws.com/role-arn: >
      arn:aws:iam::123456789:role/payment-secrets-manager-role

