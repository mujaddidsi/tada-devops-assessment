# =============================================================
# NGINX Ingress ConfigMap
# Purpose: Fine-tune NGINX performance for 1M TPS traffic
#
# NGINX sits between NLB and Istio:
# NLB (L4) → NGINX (L7 routing + rate limit) → Istio → Pod
#
# Key tuning areas:
#   1. Worker processes — maximize CPU usage
#   2. Keepalive — reuse connections instead of creating new ones
#   3. Buffer sizing — handle payment payload sizes efficiently
#   4. Rate limiting — protect against abuse per IP
#   5. SSL tuning — fast TLS handshake at scale
# =============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-ingress-controller
  namespace: ingress-nginx
data:
  # ── Worker Configuration ─────────────────────────────────
  # auto = match number of CPU cores on the node
  # Each worker handles thousands of concurrent connections
  worker-processes: "auto"

  # Maximum simultaneous connections per worker
  # Total connections = worker-processes × worker-connections
  # Example: 4 CPU × 65535 = 262,140 concurrent connections per pod
  worker-connections: "65535"
  max-worker-connections: "65535"

  # ── Keepalive Tuning ─────────────────────────────────────
  # Keep connections alive for 75 seconds
  # Avoids expensive TCP handshake for every request
  # Critical for 1M TPS — creating new connections is very costly
  keep-alive: "75"

  # Allow up to 10,000 requests per keepalive connection
  # Without this, connection closes after default 100 requests
  keep-alive-requests: "10000"

  # Keep 1000 idle connections to upstream pods ready
  # Reuses existing connections to payment pods — faster routing
  upstream-keepalive-connections: "1000"

  # ── Buffer Configuration ──────────────────────────────────
  # Buffer size for reading response headers from upstream pods
  # 16k handles most payment API response headers comfortably
  proxy-buffer-size: "16k"

  # Number of buffers for proxying responses
  proxy-buffers-number: "8"

  # Maximum allowed request body size (payment payload)
  proxy-body-size: "1m"

  # ── Timeout Configuration ─────────────────────────────────
  # How long to wait for upstream pod to accept connection
  proxy-connect-timeout: "5"

  # How long to wait for upstream pod to send response
  proxy-read-timeout: "60"
  proxy-send-timeout: "60"

  # ── SSL/TLS Configuration ─────────────────────────────────
  # Only allow TLS 1.3 — fastest and most secure version
  ssl-protocols: "TLSv1.3"

  # Cache SSL sessions to avoid full handshake on every request
  # Reduces CPU cost of TLS by ~80% for returning clients
  ssl-session-cache: "true"
  ssl-session-cache-size: "100m"

  # Disable session tickets — better forward secrecy for payments
  ssl-session-tickets: "false"

  # ── Logging Configuration ─────────────────────────────────
  # Disable access logs during peak — avoid I/O bottleneck
  # At 1M TPS, writing logs = millions of disk writes per second
  # Use sampling or async logging in production instead
  access-log-path: "/dev/null"
  error-log-level: "warn"

  # ── Compression ───────────────────────────────────────────
  # Enable gzip at level 1 — speed over compression ratio
  # Reduces bandwidth but keeps CPU usage low
  use-gzip: "true"
  gzip-level: "1"

---
# =============================================================
# Ingress Resource with Rate Limiting
# Purpose: Define routing rules and per-IP rate limits
# =============================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payment-api
  namespace: payments
  annotations:
    # Rate limit: max 5000 requests per second per IP address
    # Protects against single client overwhelming the system
    nginx.ingress.kubernetes.io/limit-rps: "5000"

    # Max 100 concurrent connections per IP
    nginx.ingress.kubernetes.io/limit-connections: "100"

    # Return 429 Too Many Requests when rate limit exceeded
    nginx.ingress.kubernetes.io/limit-req-status-code: "429"

spec:
  ingressClassName: nginx
  rules:
    - host: api.payment.tada.id
      http:
        paths:
          - path: /v1/payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 443