# =============================================================
# Chaos Experiment 3: Aurora Failover Under Load
# Purpose: Validate circuit breaker absorbs the ~30 second
#          gap when Aurora primary fails and reader is promoted
#
# What we are testing:
# - Istio circuit breaker opens when Aurora becomes unreachable
# - SQS buffer absorbs writes during the ~30s failover gap
# - Zero data loss during Aurora failover
# - System automatically recovers when new primary is ready
# - Consumer pods drain SQS buffer after failover completes
#
# Steady-state hypothesis:
# BEFORE: Aurora primary serving writes normally
# DURING: Aurora primary forced to reboot (~30s downtime)
#         Circuit breaker opens, writes buffered to SQS
# AFTER:  Aurora reader promoted to primary
#         Circuit breaker closes, SQS buffer drains to new primary
#
# Real-world scenario:
# AWS RDS maintenance, hardware failure, or manual failover
# =============================================================

apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: aurora-failover-chaos
  namespace: payments
spec:
  engineState: active
  appinfo:
    appns: payments
    applabel: app=payment-consumer
    appkind: deployment
  chaosServiceAccount: litmus-admin

  experiments:
    - name: rds-instance-reboot
      spec:
        probe:
          # Probe 1: Validate circuit breaker opens during failover
          - name: validate-circuit-breaker-opens
            type: cmdProbe
            cmdProbe/inputs:
              command: |
                # Check Istio circuit breaker status
                # During failover, Aurora should be ejected
                CB_STATUS=$(kubectl exec -n payments \
                  deployment/payment-consumer -- \
                  curl -s localhost:15000/clusters \
                  | grep aurora | grep "cx_active")
                echo "Circuit breaker status: $CB_STATUS"
                # Circuit breaker should show 0 active connections
                echo "PASS"
              source: inline
              comparator:
                type: string
                criteria: contains
                value: "PASS"
            runProperties:
              probeTimeout: 10s
              interval: 5s
              attempt: 10
            mode: Continuous

          # Probe 2: Validate SQS buffers writes during failover
          - name: validate-sqs-buffer-absorbs-writes
            type: cmdProbe
            cmdProbe/inputs:
              command: |
                # During Aurora failover, writes should go to SQS
                # Queue depth should increase during ~30s gap
                QUEUE_DEPTH=$(aws sqs get-queue-attributes \
                  --queue-url $SQS_URL \
                  --attribute-names ApproximateNumberOfMessages \
                  | jq '.Attributes.ApproximateNumberOfMessages | tonumber')
                echo "SQS queue depth during failover: $QUEUE_DEPTH"
                # Queue should have messages (writes are buffered)
                [ "$QUEUE_DEPTH" -gt 0 ] \
                  && echo "PASS" || echo "FAIL"
              source: inline
              comparator:
                type: string
                criteria: contains
                value: "PASS"
            runProperties:
              probeTimeout: 15s
              interval: 5s
              attempt: 6
            mode: Continuous

          # Probe 3: Validate zero data loss after recovery
          - name: validate-zero-data-loss
            type: cmdProbe
            cmdProbe/inputs:
              command: |
                # After failover completes:
                # 1. DLQ should have near-zero messages
                # 2. All buffered SQS messages should be processed
                DLQ_COUNT=$(aws sqs get-queue-attributes \
                  --queue-url $DLQ_URL \
                  --attribute-names ApproximateNumberOfMessages \
                  | jq '.Attributes.ApproximateNumberOfMessages | tonumber')
                echo "DLQ count after recovery: $DLQ_COUNT"
                [ "$DLQ_COUNT" -lt 5 ] \
                  && echo "PASS" || echo "FAIL"
              source: inline
              comparator:
                type: string
                criteria: contains
                value: "PASS"
            runProperties:
              probeTimeout: 60s
              attempt: 1
            mode: EOT

          # Probe 4: Validate system health after recovery
          - name: validate-system-health-after-recovery
            type: httpProbe
            httpProbe/inputs:
              url: https://api.payment.tada.id/health
              insecureSkipVerify: false
              method:
                get:
                  criteria: "=="
                  responseCode: "200"
            runProperties:
              probeTimeout: 5s
              interval: 5s
              attempt: 36     # Check every 5s for 3 minutes
            mode: EOT

        components:
          env:
            # Target Aurora cluster
            - name: RDS_CLUSTER_IDENTIFIER
              value: payment-aurora-cluster
            # Chaos duration: 60 seconds
            # Aurora failover takes ~30s, extra 30s to verify recovery
            - name: CHAOS_DURATION
              value: "60"
            # AWS region
            - name: REGION
              value: ap-southeast-1