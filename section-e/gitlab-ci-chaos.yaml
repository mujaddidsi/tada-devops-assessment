# =============================================================
# GitLab CI Pipeline with Chaos Testing Gate
# Purpose: Automatically run chaos experiments in staging
#          before every production deployment
#
# Pipeline stages:
# 1. build    — build and push Docker image
# 2. test     — unit tests and integration tests
# 3. deploy-staging — deploy to staging environment
# 4. chaos    — run all 3 chaos experiments in staging
# 5. deploy-prod — deploy to production (only if chaos passes)
#
# Key principle:
# Chaos tests are a HARD GATE — if any experiment fails,
# production deployment is BLOCKED automatically.
# No human can override this gate.
#
# This ensures:
# Every production deploy has been chaos-validated
# Regressions in resilience are caught before production
# =============================================================

stages:
  - build
  - test
  - deploy-staging
  - chaos
  - deploy-prod

# ── Variables ─────────────────────────────────────────────────
variables:
  IMAGE_NAME: 123456789.dkr.ecr.ap-southeast-1.amazonaws.com/payment-service
  STAGING_NAMESPACE: payments-staging
  PROD_NAMESPACE: payments

# ── Stage 1: Build ────────────────────────────────────────────
build-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    # Login to AWS ECR
    - aws ecr get-login-password --region ap-southeast-1
      | docker login --username AWS --password-stdin
      123456789.dkr.ecr.ap-southeast-1.amazonaws.com

    # Build Docker image
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHA .

    # Push to ECR
    - docker push $IMAGE_NAME:$CI_COMMIT_SHA

    # Tag as latest if main branch
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag $IMAGE_NAME:$CI_COMMIT_SHA $IMAGE_NAME:latest
        docker push $IMAGE_NAME:latest
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Stage 2: Test ─────────────────────────────────────────────
unit-tests:
  stage: test
  image: openjdk:17
  script:
    - ./gradlew test
    - ./gradlew jacocoTestReport
  coverage: '/Total.*?([0-9]{1,3})%/'
  artifacts:
    reports:
      junit: build/test-results/test/*.xml
    paths:
      - build/reports/jacoco/
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Stage 3: Deploy to Staging ────────────────────────────────
deploy-staging:
  stage: deploy-staging
  image: bitnami/kubectl:latest
  script:
    # Update image in staging
    - kubectl set image deployment/payment-service
      payment-service=$IMAGE_NAME:$CI_COMMIT_SHA
      -n $STAGING_NAMESPACE

    # Wait for rollout to complete
    - kubectl rollout status deployment/payment-service
      -n $STAGING_NAMESPACE
      --timeout=300s

    # Verify staging is healthy
    - |
      READY=$(kubectl get deployment payment-service \
        -n $STAGING_NAMESPACE \
        -o jsonpath='{.status.readyReplicas}')
      [ "$READY" -ge 5 ] || exit 1
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Stage 4: Chaos Testing ────────────────────────────────────
# This is the HARD GATE before production deployment
# All 3 experiments must pass or production deploy is blocked

chaos-pod-kill:
  stage: chaos
  image: litmuschaos/litmus-checker:latest
  script:
    # Apply chaos experiment to staging
    - kubectl apply -f section-e/chaos-pod-kill.yaml
      -n $STAGING_NAMESPACE

    # Wait for experiment to complete (max 5 minutes)
    - |
      echo "Waiting for pod-kill chaos experiment..."
      timeout 300 bash -c "
        until kubectl get chaosresult \
          payment-pod-kill-chaos-pod-delete \
          -n $STAGING_NAMESPACE \
          -o jsonpath='{.status.experimentStatus.verdict}' \
          | grep -q 'Pass'; do
          echo 'Experiment still running...'
          sleep 10
        done
      " || {
        echo "Pod kill chaos experiment FAILED or TIMED OUT"
        echo "Blocking production deployment"
        exit 1
      }
    - echo "Pod kill chaos experiment PASSED"

    # Cleanup chaos resources
    - kubectl delete chaosengine payment-pod-kill-chaos
      -n $STAGING_NAMESPACE
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  # HARD GATE: failure blocks all subsequent stages
  allow_failure: false

chaos-az-failure:
  stage: chaos
  image: litmuschaos/litmus-checker:latest
  script:
    - kubectl apply -f section-e/chaos-az-failure.yaml
      -n $STAGING_NAMESPACE

    - |
      echo "Waiting for AZ failure chaos experiment..."
      timeout 300 bash -c "
        until kubectl get chaosresult \
          az-failure-chaos-node-network-loss \
          -n $STAGING_NAMESPACE \
          -o jsonpath='{.status.experimentStatus.verdict}' \
          | grep -q 'Pass'; do
          echo 'Experiment still running...'
          sleep 15
        done
      " || {
        echo "AZ failure chaos experiment FAILED or TIMED OUT"
        echo "Blocking production deployment"
        exit 1
      }
    - echo "AZ failure chaos experiment PASSED"

    - kubectl delete chaosengine az-failure-chaos
      -n $STAGING_NAMESPACE
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  allow_failure: false

chaos-aurora-failover:
  stage: chaos
  image: litmuschaos/litmus-checker:latest
  script:
    - kubectl apply -f section-e/chaos-aurora-failover.yaml
      -n $STAGING_NAMESPACE

    - |
      echo "Waiting for Aurora failover chaos experiment..."
      timeout 300 bash -c "
        until kubectl get chaosresult \
          aurora-failover-chaos-rds-instance-reboot \
          -n $STAGING_NAMESPACE \
          -o jsonpath='{.status.experimentStatus.verdict}' \
          | grep -q 'Pass'; do
          echo 'Experiment still running...'
          sleep 10
        done
      " || {
        echo "Aurora failover chaos experiment FAILED or TIMED OUT"
        echo "Blocking production deployment"
        exit 1
      }
    - echo "Aurora failover chaos experiment PASSED"

    - kubectl delete chaosengine aurora-failover-chaos
      -n $STAGING_NAMESPACE
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  allow_failure: false

# ── Stage 5: Deploy to Production ────────────────────────────
# Only runs if ALL chaos experiments pass
deploy-prod:
  stage: deploy-prod
  image: bitnami/kubectl:latest
  script:
    # Update image in production
    - kubectl set image deployment/payment-service
      payment-service=$IMAGE_NAME:$CI_COMMIT_SHA
      -n $PROD_NAMESPACE

    # Wait for rollout — with longer timeout for production
    - kubectl rollout status deployment/payment-service
      -n $PROD_NAMESPACE
      --timeout=600s

    # Verify production is healthy
    - |
      READY=$(kubectl get deployment payment-service \
        -n $PROD_NAMESPACE \
        -o jsonpath='{.status.readyReplicas}')
      echo "Production ready replicas: $READY"
      [ "$READY" -ge 10 ] || exit 1

    # Send deployment notification to Slack
    - |
      curl -X POST $SLACK_WEBHOOK_URL \
        -H 'Content-type: application/json' \
        -d "{
          \"text\": \"Payment service deployed to production\",
          \"attachments\": [{
            \"color\": \"good\",
            \"fields\": [
              {\"title\": \"Version\", \"value\": \"$CI_COMMIT_SHA\"},
              {\"title\": \"Chaos Tests\", \"value\": \"All 3 passed\"},
              {\"title\": \"Deployed by\", \"value\": \"$GITLAB_USER_NAME\"}
            ]
          }]
        }"

  # Manual approval required before production deploy
  # Even after chaos tests pass, human must approve
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  # This stage needs all chaos stages to pass
  needs:
    - chaos-pod-kill
    - chaos-az-failure
    - chaos-aurora-failover